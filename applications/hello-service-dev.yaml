apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-service-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/RootUserGit/eks-gitops-argoCD.git
    path: charts/hello-service
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
